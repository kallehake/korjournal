name: Korjournal — Fordonspollare

on:
  schedule:
    - cron: "*/5 * * * *"   # var 5:e minut
  workflow_dispatch:          # manuell körning för test

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Installera beroenden
        run: pip install -r scripts/requirements.txt

      - name: BYD — hämta kördata
        env:
          BYD_EMAIL:                 ${{ secrets.BYD_EMAIL }}
          BYD_PASSWORD:              ${{ secrets.BYD_PASSWORD }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/byd_poll.py

      - name: Tesla — hämta kördata
        env:
          TESLA_REFRESH_TOKEN:       ${{ secrets.TESLA_REFRESH_TOKEN }}
          TESLA_VIN:                 ${{ secrets.TESLA_VIN }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/tesla_poll.py
